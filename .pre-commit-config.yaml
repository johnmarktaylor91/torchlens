repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # canonical perf baselines + the menagerie catalog are intentional large data artifacts
        exclude: ^(benchmarks/perf_baselines/.*\.json|menagerie/data/master_catalog\.tsv)$
      - id: detect-private-key
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: no-breaking-markers-commit-msg
        name: Block semantic-release major-bump triggers (commit-msg)
        entry: python scripts/check_no_breaking_markers.py --commit-msg
        language: system
        stages: [commit-msg]
        pass_filenames: true
      - id: no-breaking-markers-pre-push
        name: Block semantic-release major-bump triggers (pre-push)
        entry: python scripts/check_no_breaking_markers.py --pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: no-internal-notes
        name: Internal planning notes must stay private
        entry: >-
          BLOCKED: internal planning/notes must NOT be committed to this PUBLIC repo.
          .research/ and .project-context/ (except architecture.md and state_of_torchlens.md)
          are gitignored on purpose. Do not `git add -f` them. To untrack, use `git rm --cached`.
        language: fail
        # commit stage only: catches `git add` of a private path. At pre-push the same matcher
        # would fire on DELETIONS of these paths (e.g. the commit that untracks them), so scope here.
        stages: [pre-commit]
        files: '^\.research/|^\.project-context/(?!(architecture|state_of_torchlens)\.md$)'
