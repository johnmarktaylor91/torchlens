repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: no-breaking-markers-commit-msg
        name: Block semantic-release major-bump triggers (commit-msg)
        entry: python scripts/check_no_breaking_markers.py --commit-msg
        language: system
        stages: [commit-msg]
        pass_filenames: true
      - id: no-breaking-markers-pre-push
        name: Block semantic-release major-bump triggers (pre-push)
        entry: python scripts/check_no_breaking_markers.py --pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
