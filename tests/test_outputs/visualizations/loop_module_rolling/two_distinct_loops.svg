<text text-anchor="start" x="22" y="-590.8" font-family="Courier,monospace" font-size="14.00">def __init__(self) &#45;&gt; None:</text>
<text text-anchor="start" x="22" y="-571.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;&quot;&quot;&quot;Initialize the shared module.&quot;&quot;&quot;</text>
<text text-anchor="start" x="22" y="-552.8" font-family="Courier,monospace" font-size="14.00"> </text>
<text text-anchor="start" x="22" y="-533.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;super().__init__()</text>
<text text-anchor="start" x="22" y="-514.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;self.shared = nn.Linear(4, 4, bias=False)</text>
<text text-anchor="start" x="22" y="-495.8" font-family="Courier,monospace" font-size="14.00"> </text>
<text text-anchor="start" x="22" y="-476.8" font-family="Courier,monospace" font-size="14.00">def forward(self, x: torch.Tensor) &#45;&gt; torch.Tensor:</text>
<text text-anchor="start" x="22" y="-457.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;&quot;&quot;&quot;Run two separate loops that reuse the same module.&quot;&quot;&quot;</text>
<text text-anchor="start" x="22" y="-438.8" font-family="Courier,monospace" font-size="14.00"> </text>
<text text-anchor="start" x="22" y="-419.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;first = x</text>
<text text-anchor="start" x="22" y="-400.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;for _ in range(2):</text>
<text text-anchor="start" x="22" y="-381.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;first = self.shared(first)</text>
<text text-anchor="start" x="22" y="-362.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;second = x + 1</text>
<text text-anchor="start" x="22" y="-343.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;for _ in range(3):</text>
<text text-anchor="start" x="22" y="-324.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;&#160;&#160;&#160;&#160;second = self.shared(second)</text>
<text text-anchor="start" x="22" y="-305.8" font-family="Courier,monospace" font-size="14.00"> &#160;&#160;&#160;return first + second</text>
<text text-anchor="start" x="22" y="-156.3" font-family="Courier,monospace" font-size="14.00" fill="#fafafa"> </text>
</g>
