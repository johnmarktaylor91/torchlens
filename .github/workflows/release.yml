name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    # Belt-and-suspenders with the `[skip ci]` token in the release commit
    # message: never run a release on the bot's own release commit, so a missing
    # skip token can't reignite the runaway release loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # git-lfs's pre-push hook tries to verify LFS objects against the
      # tokenized App URL (username `torchlens-release[bot]` -- the brackets
      # break git-lfs endpoint parsing: "batch request: missing protocol").
      # Plain commit pushes tolerate it, but the TAG push invokes LFS and dies,
      # so no version tag is ever created and every run re-releases. The LFS
      # objects are already on the remote, so uninstalling the local LFS hooks
      # lets the tag push (a pure ref create) succeed.
      - name: Disable git-lfs hooks for release pushes
        run: git lfs uninstall

      - name: Install dependencies
        run: pip install "python-semantic-release>=9,<10"

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release publish
