name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    # Belt-and-suspenders with the `[skip ci]` token in the release commit
    # message: never run a release on the bot's own release commit, so a missing
    # skip token can't reignite the runaway release loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # The version TAG push invokes git-lfs (a few .research/*.md files are
      # LFS-tracked). CI checks out with lfs disabled (pointers only, no LFS
      # content), so the push is rejected with "missing or corrupt local
      # objects" -- but those objects already live on the remote (pushed when
      # the files landed on main), so an incomplete push is safe here. Without
      # this, the tag never gets created and (pre-`[skip ci]`) every run
      # re-released -> the 1599-commit runaway. `locksverify=false` additionally
      # sidesteps the locking-API failure caused by the App's bracketed
      # credential URL (`torchlens-release[bot]`).
      - name: Let git-lfs tolerate the CI tag push
        run: |
          git config lfs.allowincompletepush true
          git config lfs.locksverify false

      - name: Install dependencies
        run: pip install "python-semantic-release>=9,<10"

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release publish
