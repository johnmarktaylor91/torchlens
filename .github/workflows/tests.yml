name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "${{ github.head_ref || github.ref }}-tests"
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (torch ${{ matrix.torch }}, py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the declared floor (2.4) and a recent version.
        # Keeping two entries keeps CI minutes under control while still
        # flagging regressions against both ends of the support window.
        include:
          - python: "3.10"
            torch: "2.4.*"
          - python: "3.11"
            torch: "2.7.*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v5

      - name: Install graphviz (system dep -- the `dot` binary used by
          tests that render visualization output)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install torch (${{ matrix.torch }}, CPU wheel)
        run: |
          uv pip install --system "torch==${{ matrix.torch }}" \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install torchlens (with test extras)
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run smoke tests
        run: |
          pytest tests/ -m smoke -x --tb=short -q

  audit-notebooks:
    name: Total Audit smoke notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - name: Install graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install torchlens and notebook runner
        run: |
          uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system -e ".[dev]"
          uv pip install --system papermill nbformat ipykernel

      - name: Check Total Audit coverage manifest delta
        run: |
          python scripts/generate_audit_coverage_manifest.py
          python scripts/check_coverage_delta.py

      - name: Run Total Audit smoke subset
        run: |
          for nb in \
            notebooks/total_audit/00_install_and_smoke.ipynb \
            notebooks/total_audit/01_basic_capture.ipynb \
            notebooks/total_audit/02_layer_indexing.ipynb \
            notebooks/total_audit/19_bundles_advanced.ipynb \
            notebooks/total_audit/25_compat_truth_table.ipynb
          do
            papermill "$nb" "/tmp/$(basename "$nb")" -k python3
          done
